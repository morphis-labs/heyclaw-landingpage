<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>heyclaw - AI-Powered Instagram Growth</title>
  <meta name="description" content="Grow your Instagram with AI-powered insights. Analyze reels, discover accounts, get daily reports.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vampiro+One&family=Urbanist:wght@900&family=Pacifico&family=Bungee+Shade&family=Caveat:wght@400;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F3F0;
      --text: #2b2d42;
      --text-dark: #1E1E1E;
      --text-dim: #6b7280;
      --text-muted: #9ca3af;
      --red: #e63946;
      --border: rgba(0, 0, 0, 0.06);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: clip; overflow-x: clip; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Header ===== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(245, 243, 240, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover {
      background: #d62f3c;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(230, 57, 70, 0.25);
    }

    /* ===== Intro Stage ===== */
    .intro-stage {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* Title */
    .stage-title {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      will-change: transform, opacity;
      user-select: none;
      font-family: 'Vampiro One', cursive;
      font-size: 60px;
      font-weight: 400;
      color: var(--text-dark);
    }

    /* Monsters */
    .stage-monster {
      position: absolute;
      left: 0; top: 0;
      will-change: transform, opacity;
      pointer-events: none;
    }
    .stage-monster img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .scroll-hint.visible { opacity: 0.4; }
    .scroll-hint span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .scroll-hint svg {
      width: 20px; height: 20px;
      stroke: var(--text-dim);
      animation: scrollBounce 2s ease-in-out infinite;
    }
    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ===== CTA Section ===== */
    .scene-cta {
      padding: 100px 24px;
      text-align: center;
    }
    .cta-content h2 {
      font-family: 'Caveat', cursive;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
      opacity: 0; transform: translateY(30px);
    }
    .cta-content p {
      font-size: 16px;
      color: var(--text-dim);
      margin-bottom: 40px;
      max-width: 420px;
      margin-left: auto; margin-right: auto;
      opacity: 0; transform: translateY(20px);
    }
    .cta-content .btn { opacity: 0; transform: translateY(20px); }
    .cta-monsters {
      display: flex;
      justify-content: center;
      gap: clamp(30px, 6vw, 80px);
      margin-top: 60px;
    }
    .cta-monster {
      width: clamp(60px, 9vw, 95px);
      opacity: 0; transform: translateY(40px);
    }
    .cta-monster img {
      width: 100%; height: auto;
      user-select: none; -webkit-user-drag: none;
    }

    .scene-cta.visible .cta-content h2 { animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .scene-cta.visible .cta-content p { animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s forwards; }
    .scene-cta.visible .cta-content .btn { animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s forwards; }
    .scene-cta.visible .cta-monster:nth-child(1) { animation: bounceDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards; }
    .scene-cta.visible .cta-monster:nth-child(2) { animation: bounceDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s forwards; }
    .scene-cta.visible .cta-monster:nth-child(3) { animation: bounceDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards; }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounceDrop {
      0% { transform: translateY(40px); opacity: 0; }
      50% { opacity: 1; }
      70% { transform: translateY(-15px); }
      85% { transform: translateY(4px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* ===== Footer ===== */
    footer {
      padding: 40px 24px;
      border-top: 1px solid var(--border);
    }
    .footer-content {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }
    .footer-logo {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .footer-links { display: flex; gap: 32px; }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text); }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      nav { padding: 12px 16px; }
      .logo { font-size: 24px; }
      .btn { padding: 8px 14px; font-size: 12px; }
    }
    @media (max-width: 480px) {
      .cta-monster { width: 70px; }
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      .scroll-hint { display: none; }
      .scene-cta .cta-content h2,
      .scene-cta .cta-content p,
      .scene-cta .cta-content .btn,
      .scene-cta .cta-monster {
        opacity: 1 !important;
        transform: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav>
      <a href="/" class="logo">heyclaw</a>
      <a href="#" class="btn btn-primary">Get Started</a>
    </nav>
  </header>

  <!-- Intro Animation Stage -->
  <section class="intro-stage" id="stage">
    <div class="stage-title" id="stageTitle">heyclaw</div>

    <div class="stage-monster" id="monsterBlack"><img src="assets/monster-black.png" alt="" draggable="false"></div>
    <div class="stage-monster" id="monsterRed"><img src="assets/monster-red.png" alt="" draggable="false"></div>
    <div class="stage-monster" id="monsterBlue"><img src="assets/monster-blue.png" alt="" draggable="false"></div>

    <div class="scroll-hint" id="scrollHint">
      <span>Scroll</span>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
  </section>

  <!-- CTA -->
  <section class="scene-cta" id="cta">
    <div class="cta-content">
      <h2>Ready to grow your Instagram?</h2>
      <p>Join creators using heyclaw to grow their audience with AI-powered insights.</p>
      <a href="#" class="btn btn-primary" style="padding: 16px 36px; font-size: 16px;">Start Free Trial</a>
    </div>
    <div class="cta-monsters">
      <div class="cta-monster"><img src="assets/monster-black.png" alt="" draggable="false"></div>
      <div class="cta-monster"><img src="assets/monster-red.png" alt="" draggable="false"></div>
      <div class="cta-monster"><img src="assets/monster-blue.png" alt="" draggable="false"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-logo">heyclaw</div>
      <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Service</a>
        <a href="mailto:support@heyclaw.com">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    (function() {
      'use strict';

      var titleEl = document.getElementById('stageTitle');
      var els = {
        black: document.getElementById('monsterBlack'),
        red: document.getElementById('monsterRed'),
        blue: document.getElementById('monsterBlue'),
      };
      var scrollHint = document.getElementById('scrollHint');

      // ---- Viewport-aware helpers ----
      function peekY(monsterVw, fraction) {
        var vw = window.innerWidth, vh = window.innerHeight;
        var px = (monsterVw / 100) * vw;
        return ((vh - px * fraction + px / 2) / vh) * 100;
      }

      var HIDDEN = 130;
      var s = window.innerWidth < 768 ? 1.6 : 1;

      // ---- Title timeline (always centered, with bump) ----
      // Title stays at center (50vw, 50vh via CSS), we only animate opacity + scale
      var titleTimeline = [
        { t: 0,    opacity: 0, scale: 0.85 },
        { t: 250,  opacity: 1, scale: 1.12 },     // fade in + bump up
        { t: 450,  opacity: 1, scale: 1.0 },      // settle back
        { t: 3500, opacity: 1, scale: 1.0 },      // hold
      ];

      // ---- Scene 3 font switching (discrete, not interpolated) ----
      // Cycle: Urbanist(4f/133ms) → Pacifico(6f/200ms) → Bungee Shade(4f/133ms) = 466ms per loop
      // Repeat 3 times, then back to Vampiro One
      var fontCycle = [
        { dur: 133, font: "'Urbanist', sans-serif", weight: 900 },
        { dur: 200, font: "'Pacifico', cursive", weight: 400 },
        { dur: 133, font: "'Bungee Shade', cursive", weight: 400 },
      ];
      var SCENE3_START = 1333;
      var CYCLE_DUR = 133 + 200 + 133; // 466ms per loop
      var SCENE3_REPEATS = 3;
      var SCENE3_END = SCENE3_START + CYCLE_DUR * SCENE3_REPEATS; // 2731ms

      // Build fontSwitches array: 3 full cycles + final Vampiro One
      var fontSwitches = [];
      for (var rep = 0; rep < SCENE3_REPEATS; rep++) {
        var offset = SCENE3_START + rep * CYCLE_DUR;
        var cumulative = 0;
        for (var f = 0; f < fontCycle.length; f++) {
          fontSwitches.push({ t: offset + cumulative, font: fontCycle[f].font, weight: fontCycle[f].weight });
          cumulative += fontCycle[f].dur;
        }
      }
      fontSwitches.push({ t: SCENE3_END, font: "'Vampiro One', cursive", weight: 400 });
      var currentFontIndex = -1;

      // ---- Monster timelines ----
      var blackPeek = peekY(15 * s, 0.55);
      var redPeek = peekY(18 * s, 0.55);
      var bluePeek = peekY(16 * s, 0.55);

      var monsterTimeline = {
        black: [
          { t: 0,    opacity: 0, x: 50, y: HIDDEN, w: 15*s, orbit: 0 },
          { t: 180,  opacity: 1, x: 50, y: blackPeek, w: 15*s, orbit: 0 },
          { t: 380,  opacity: 1, x: 50, y: blackPeek, w: 15*s, orbit: 0 },
          { t: 600,  opacity: 0, x: 50, y: HIDDEN, w: 15*s, orbit: 0 },
          { t: 2000, opacity: 0, x: 75, y: HIDDEN, w: 11*s, orbit: 0 },
          { t: 2200, opacity: 1, x: 75, y: 82, w: 11*s, orbit: 2 },
          { t: 2500, opacity: 1, x: 78, y: 68, w: 13*s, orbit: 5 },
          { t: 2800, opacity: 0.6, x: 95, y: 95, w: 13*s, orbit: 10 },
          { t: 3000, opacity: 0, x: 115, y: 115, w: 13*s, orbit: 16 },
        ],
        red: [
          { t: 0,    opacity: 0, x: 50, y: HIDDEN, w: 18*s, orbit: 0 },
          { t: 667,  opacity: 0, x: 50, y: HIDDEN, w: 18*s, orbit: 0 },
          { t: 900,  opacity: 1, x: 50, y: redPeek, w: 18*s, orbit: 0 },
          { t: 1280, opacity: 1, x: 50, y: redPeek, w: 18*s, orbit: 0 },
          { t: 1650, opacity: 1, x: 22, y: 35, w: 18*s, orbit: 3 },
          { t: 2100, opacity: 1, x: 38, y: 20, w: 16*s, orbit: 5 },
          { t: 2500, opacity: 1, x: 68, y: 15, w: 14*s, orbit: 7 },
          { t: 2800, opacity: 0.6, x: 85, y: -10, w: 14*s, orbit: 12 },
          { t: 3000, opacity: 0, x: 105, y: -30, w: 14*s, orbit: 18 },
        ],
        blue: [
          { t: 0,    opacity: 0, x: 80, y: HIDDEN, w: 16*s, orbit: 0 },
          { t: 1333, opacity: 0, x: 80, y: HIDDEN, w: 16*s, orbit: 0 },
          { t: 1700, opacity: 1, x: 80, y: bluePeek, w: 16*s, orbit: 0 },
          { t: 2100, opacity: 1, x: 45, y: 70, w: 16*s, orbit: 4 },
          { t: 2500, opacity: 1, x: 20, y: 50, w: 14*s, orbit: 6 },
          { t: 2800, opacity: 0.6, x: -10, y: 55, w: 14*s, orbit: 12 },
          { t: 3000, opacity: 0, x: -30, y: 60, w: 14*s, orbit: 18 },
        ],
      };

      // Orbital phase offsets (120° apart)
      var orbitPhase = { red: 0, blue: (2 * Math.PI) / 3, black: (4 * Math.PI) / 3 };
      var ORBIT_SPEED = 0.004;

      // ---- Interpolation ----
      function lerp(a, b, t) { return a + (b - a) * t; }

      function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function getKeyframe(kfs, time) {
        if (time <= kfs[0].t) return Object.assign({}, kfs[0]);
        if (time >= kfs[kfs.length - 1].t) return Object.assign({}, kfs[kfs.length - 1]);
        var i = 0;
        while (i < kfs.length - 1 && kfs[i + 1].t <= time) i++;
        var from = kfs[i], to = kfs[i + 1];
        var raw = (time - from.t) / (to.t - from.t);
        var t = easeInOut(raw);
        var result = {};
        for (var key in from) {
          if (key === 't') continue;
          result[key] = lerp(from[key], to[key], t);
        }
        return result;
      }

      // ---- Apply to DOM ----
      function applyTitle(state, elapsed) {
        titleEl.style.opacity = state.opacity;
        titleEl.style.transform = 'translate(-50%, -50%) scale(' + state.scale + ')';

        // Discrete font switching during Scene 3
        var newFontIndex = -1;
        for (var i = fontSwitches.length - 1; i >= 0; i--) {
          if (elapsed >= fontSwitches[i].t) { newFontIndex = i; break; }
        }
        if (newFontIndex !== currentFontIndex) {
          currentFontIndex = newFontIndex;
          if (newFontIndex >= 0) {
            titleEl.style.fontFamily = fontSwitches[newFontIndex].font;
            titleEl.style.fontWeight = fontSwitches[newFontIndex].weight;
          } else {
            titleEl.style.fontFamily = "'Vampiro One', cursive";
            titleEl.style.fontWeight = 400;
          }
        }
      }

      function applyMonster(el, state, phase, elapsed) {
        var angle = elapsed * ORBIT_SPEED + phase;
        var orbitR = state.orbit || 0;
        var ox = orbitR * Math.cos(angle);
        var oy = orbitR * Math.sin(angle);
        el.style.opacity = state.opacity;
        el.style.width = state.w + 'vw';
        el.style.transform = 'translate(calc(' + (state.x + ox) + 'vw - 50%), calc(' + (state.y + oy) + 'vh - 50%))';
      }

      // ---- Animation Loop ----
      var startTime = null;
      var DURATION = 3500;
      var done = false;

      function tick(timestamp) {
        if (!startTime) startTime = timestamp;
        var elapsed = timestamp - startTime;

        // Title (always centered, with bump + font switch)
        applyTitle(getKeyframe(titleTimeline, elapsed), elapsed);

        // Monsters
        applyMonster(els.black, getKeyframe(monsterTimeline.black, elapsed), orbitPhase.black, elapsed);
        applyMonster(els.red, getKeyframe(monsterTimeline.red, elapsed), orbitPhase.red, elapsed);
        applyMonster(els.blue, getKeyframe(monsterTimeline.blue, elapsed), orbitPhase.blue, elapsed);

        if (elapsed > 3200 && !done) {
          scrollHint.classList.add('visible');
          done = true;
        }

        if (elapsed < DURATION) {
          requestAnimationFrame(tick);
        }
      }

      // Initialize hidden
      titleEl.style.opacity = '0';
      Object.keys(els).forEach(function(k) { els[k].style.opacity = '0'; });

      // Start animation
      requestAnimationFrame(tick);

      // ---- CTA Intersection Observer ----
      var ctaSection = document.getElementById('cta');
      var ctaObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            ctaObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });
      ctaObserver.observe(ctaSection);

    })();
  </script>
</body>
</html>
